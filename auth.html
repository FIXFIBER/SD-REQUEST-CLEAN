<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://www.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src 'self' https:; frame-ancestors 'none';"
    />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <title>Authentication | FiberOne Internal Portal</title>
    <link rel="icon" type="image/png" href="logo/img2.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .auth-grid-transition {
        display: grid;
        grid-template-rows: 0fr;
        transition:
          grid-template-rows 0.3s ease-out,
          opacity 0.3s ease-out;
        opacity: 0;
      }

      .auth-grid-transition.active {
        grid-template-rows: 1fr;
        opacity: 1;
        margin-bottom: 1rem;
      }
    </style>
  </head>

  <body
    class="bg-[#f8fafc] min-h-screen flex flex-col items-center justify-center p-4"
  >
    <!-- Main Auth Card -->
    <div
      class="w-full max-w-[440px] bg-white border border-[#e2e8f0] rounded-2xl shadow-sm p-8 md:p-10"
    >
      <!-- Header Branding -->
      <div class="flex flex-col items-center mb-8">
        <div class="flex items-center gap-3 mb-3">
          <img src="logo/img1.png" alt="FiberOne" class="h-7 w-auto" />
          <div class="w-px h-5 bg-gray-200"></div>
          <span
            class="text-slate-400 font-medium tracking-[0.15em] text-[11px] uppercase"
            >Internal Portal</span
          >
        </div>
        <h1 class="text-slate-500 text-[15px] font-normal">
          Sign in to the internal portal
        </h1>
      </div>

      <!-- Microsoft Auth Section -->
      <div class="space-y-4 mb-8">
        <button
          id="ms-btn"
          class="w-full flex items-center justify-between px-4 py-3 border border-[#e2e8f0] rounded-full bg-white hover:bg-gray-50 transition-all duration-200"
        >
          <svg
            class="w-5 h-5 shrink-0"
            viewBox="0 0 23 23"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M0 0H11V11H0V0Z" fill="#F25022" />
            <path d="M12 0H23V11H12V0Z" fill="#7FBA00" />
            <path d="M0 12H11V23H0V12Z" fill="#00A4EF" />
            <path d="M12 12H23V23H12V12Z" fill="#FFB900" />
          </svg>
          <span class="text-slate-700 font-semibold text-sm"
            >Sign in with Microsoft</span
          >
          <span
            class="text-[9px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded font-bold tracking-tighter"
            >SOON</span
          >
        </button>

        <div class="flex items-center justify-center gap-1.5">
          <svg
            class="w-3 h-3 text-slate-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
          <p class="text-xs text-slate-400">
            Only @fob.ng company emails are allowed.
          </p>
        </div>
      </div>

      <!-- Segmented Toggle -->
      <div class="relative flex p-1 bg-[#f1f5f9] rounded-xl mb-8">
        <div
          id="tab-highlight"
          class="absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white rounded-lg shadow-sm transition-transform duration-300"
        ></div>
        <button
          id="login-tab"
          class="relative z-10 flex-1 py-2 text-sm font-bold text-[#0f172a] transition-colors"
        >
          Log in
        </button>
        <button
          id="signup-tab"
          class="relative z-10 flex-1 py-2 text-sm font-bold text-slate-400 transition-colors"
        >
          Sign up
        </button>
      </div>

      <!-- Auth Form -->
      <form id="auth-form" class="space-y-5">
        <!-- Full Name (Hidden by default) -->
        <div id="name-container" class="auth-grid-transition">
          <div class="overflow-hidden">
            <label class="block text-sm font-bold text-[#0f172a] mb-2"
              >Full name</label
            >
            <div
              class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all"
            >
              <input
                id="input-name"
                type="text"
                placeholder="Jane Doe"
                class="w-full bg-transparent border-none outline-none text-sm text-slate-900 placeholder:text-slate-400"
              />
            </div>
          </div>
        </div>

        <!-- Department (Visible on Signup) -->
        <div id="dept-container" class="auth-grid-transition">
          <div class="overflow-hidden">
            <label class="block text-sm font-bold text-[#0f172a] mb-2"
              >Department</label
            >
            <div
              class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all"
            >
              <select
                id="input-dept"
                class="w-full bg-transparent border-none outline-none text-sm text-slate-900 appearance-none cursor-pointer"
              >
                <option value="" disabled selected>
                  Loading departments...
                </option>
              </select>
            </div>
          </div>
        </div>

        <!-- Gender (Visible on Signup) -->
        <div id="gender-container" class="auth-grid-transition">
          <div class="overflow-hidden">
            <label class="block text-sm font-bold text-[#0f172a] mb-2"
              >Gender</label
            >
            <div
              class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all"
            >
              <select
                id="input-gender"
                class="w-full bg-transparent border-none outline-none text-sm text-slate-900 appearance-none cursor-pointer"
              >
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-bold text-[#0f172a] mb-2"
            >Work email</label
          >
          <div
            class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all"
          >
            <input
              id="input-email"
              type="email"
              placeholder="you@fob.ng"
              class="w-full bg-transparent border-none outline-none text-sm text-slate-900 placeholder:text-slate-400"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-bold text-[#0f172a] mb-2"
            >Password</label
          >
          <div
            class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all"
          >
            <input
              id="input-password"
              type="password"
              placeholder="••••••••"
              class="w-full bg-transparent border-none outline-none text-sm text-slate-900 placeholder:text-slate-400"
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-[#0f172a] hover:bg-slate-800 text-white font-bold py-4 rounded-full transition-all duration-300 text-sm mt-2 shadow-lg shadow-slate-200"
        >
          <span id="submit-btn-text">Sign in</span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <footer class="mt-8">
      <p
        class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold text-center"
      >
        Internal use only · Fiber One Broadband employees
      </p>
    </footer>

    <script>
      // Inject the real script URL at the very top of the script block
      var scriptUrl = "<?= scriptUrl ?>";

      // ─────────────────────────────────────────────────────────────────────
      // GAS SAFETY WRAPPER
      // google.script.run only exists when served through Google Apps Script.
      // When the file is opened locally (file:// or localhost), it's undefined
      // and every call to it throws "google is not defined", freezing the UI.
      // This wrapper detects that and uses mock responses for local testing.
      // ─────────────────────────────────────────────────────────────────────
      var GAS_READY = (function () {
        try {
          return (
            typeof google !== "undefined" &&
            !!google.script &&
            !!google.script.run
          );
        } catch (e) {
          return false;
        }
      })();
      // scriptUrl is injected by the GAS template engine at serve time.
      // If we're running locally it won't exist, so default to empty string.
      var SCRIPT_URL = (function () {
        try {
          return typeof scriptUrl !== "undefined" ? scriptUrl : "";
        } catch (e) {
          return "";
        }
      })();

      // ─────────────────────────────────────────────────────────────────────
      // SAFE CALL — wraps google.script.run so it never throws locally
      // ─────────────────────────────────────────────────────────────────────
      var WEB_APP_URL = localStorage.getItem("fob_backend_url") || "";
      try {
        if (
          typeof scriptUrl !== "undefined" &&
          String(scriptUrl).indexOf("http") === 0
        ) {
          WEB_APP_URL = scriptUrl;
          localStorage.setItem("fob_backend_url", scriptUrl);
        }
      } catch (e) {}

      // Domain-based auto-config for the official deployment
      if (!WEB_APP_URL) {
        var host = window.location.hostname.toLowerCase();
        var KNOWN_DOMAINS = {
          "pat.fob.net.ng":
            "https://script.google.com/macros/s/AKfycbw4tb8ahqX7bCs_MnPyblmz-Ke8h9CIlk_BMwGF9NbuHwr3n5sPT0pcpagg1DX57U2x/exec",
          localhost: true,
          "127.0.0.1": true,
        };
        if (KNOWN_DOMAINS[host] && KNOWN_DOMAINS[host] !== true) {
          WEB_APP_URL = KNOWN_DOMAINS[host];
          localStorage.setItem("fob_backend_url", WEB_APP_URL);
        }
      }

      var IS_GAS_ENV =
        typeof google !== "undefined" && google.script && google.script.run;

      function gasCall(fnName, args, onSuccess, onError) {
        // If running inside Google Apps Script, use built-in API (no URL exposed)
        if (IS_GAS_ENV) {
          google.script.run
            .withSuccessHandler(onSuccess)
            .withFailureHandler(onError)
            [fnName](...args);
          return;
        }

        if (!WEB_APP_URL) {
          if (onError) onError(new Error("Backend not configured"));
          return;
        }
        const payload = {
          action: fnName,
          args: args,
          _origin: window.location.origin,
        };

        fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors", // GAS requires no-cors for cross-domain POST from local
          body: JSON.stringify(payload),
        })
          .then(() => {
            // Because GAS doesn't return body in no-cors, we do a secondary GET to get results
            // or we use a JSONP approach. For simplicity in syncing:
            return fetch(
              `${WEB_APP_URL}?action=${fnName}&data=${encodeURIComponent(JSON.stringify(args))}`,
            );
          })
          .then((response) => response.json())
          .then((res) => onSuccess(res))
          .catch((err) => {
            if (onError) onError(err);
            console.error("Sync Error:", err);
          });
      }

      // ─────────────────────────────────────────────────────────────────────
      // UI ELEMENTS
      // ─────────────────────────────────────────────────────────────────────
      var loginTab = document.getElementById("login-tab");
      var signupTab = document.getElementById("signup-tab");
      var tabHighlight = document.getElementById("tab-highlight");
      var nameContainer = document.getElementById("name-container");
      var submitBtn = document.getElementById("submit-btn");
      var submitBtnText = document.getElementById("submit-btn-text");
      var authForm = document.getElementById("auth-form");
      var msBtn = document.getElementById("ms-btn");

      // ─────────────────────────────────────────────────────────────────────
      // TOAST
      // ─────────────────────────────────────────────────────────────────────
      function showToast(message, type) {
        type = type || "error";
        var toast = document.createElement("div");
        toast.className =
          "fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-xs font-medium shadow-xl z-50 transition-all duration-300 transform translate-y-2 opacity-0 text-white " +
          (type === "error" ? "bg-red-600" : "bg-slate-900");
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(function () {
          toast.classList.remove("translate-y-2", "opacity-0");
        }, 10);
        setTimeout(function () {
          toast.classList.add("translate-y-2", "opacity-0");
          setTimeout(function () {
            toast.remove();
          }, 300);
        }, 3000);
      }

      // ─────────────────────────────────────────────────────────────────────
      // TAB TOGGLE
      // ─────────────────────────────────────────────────────────────────────
      function toggleTab(mode) {
        if (mode === "signup") {
          tabHighlight.style.transform = "translateX(100%)";
          signupTab.className = signupTab.className.replace(
            "text-slate-400",
            "text-[#0f172a]",
          );
          loginTab.className = loginTab.className.replace(
            "text-[#0f172a]",
            "text-slate-400",
          );
          nameContainer.classList.add("active");
          document.getElementById("dept-container").classList.add("active");
          document.getElementById("gender-container").classList.add("active");
          submitBtnText.innerText = "Create account";
        } else {
          tabHighlight.style.transform = "translateX(0)";
          loginTab.className = loginTab.className.replace(
            "text-slate-400",
            "text-[#0f172a]",
          );
          signupTab.className = signupTab.className.replace(
            "text-[#0f172a]",
            "text-slate-400",
          );
          nameContainer.classList.remove("active");
          document.getElementById("dept-container").classList.remove("active");
          document
            .getElementById("gender-container")
            .classList.remove("active");
          submitBtnText.innerText = "Sign in";
        }
      }

      loginTab.addEventListener("click", function () {
        toggleTab("login");
      });
      signupTab.addEventListener("click", function () {
        toggleTab("signup");
      });

      // Fetch Departments and Domain on Load
      window.onload = function () {
        // Get allowed domain for display
        gasCall("getDomainConfig", [], (res) => {
          if (res.success) {
            const textXs =
              document.querySelector(".auth-grid-transition + div .text-xs") ||
              document.querySelector("p.text-xs.text-slate-400");
            if (textXs)
              textXs.innerText = `Only ${res.domain} company emails are allowed.`;
            document.getElementById("input-email").placeholder =
              `you${res.domain}`;
          }
        });

        // Get departments for signup dropdown
        gasCall("getPublicDepartments", [], (res) => {
          if (res.success) {
            document.getElementById("input-dept").innerHTML =
              '<option value="" disabled selected>Select Department</option>' +
              res.data
                .map((name) => `<option value="${name}">${name}</option>`)
                .join("");
          }
        });
      };

      // ─────────────────────────────────────────────────────────────────────
      // FORM SUBMIT
      // ─────────────────────────────────────────────────────────────────────
      authForm.addEventListener("submit", function (e) {
        e.preventDefault();

        var name = document.getElementById("input-name").value.trim();
        var dept = document.getElementById("input-dept").value;
        var gender = document.getElementById("input-gender").value;
        var email = document
          .getElementById("input-email")
          .value.toLowerCase()
          .trim();
        var password = document.getElementById("input-password").value;
        var isSignup = submitBtnText.innerText === "Create account";

        // ── Validation ──────────────────────────────────────────────────
        if (!email) {
          showToast("Email is required.");
          return;
        }

        // Use the dynamically fetched domain for validation
        const allowedDomainElement = document.querySelector(
          ".auth-grid-transition + div .text-xs",
        );
        const allowedDomainText = allowedDomainElement
          ? allowedDomainElement.innerText
          : "";
        const currentAllowedDomain = allowedDomainText.match(/@[\w.]+/);
        if (currentAllowedDomain && !email.endsWith(currentAllowedDomain[0])) {
          showToast(
            `Please use an official ${currentAllowedDomain[0]} email address.`,
          );
          return;
        }

        // System accounts for password-less testing
        const systemAccounts = [
          "mec-test@fob.ng",
          "project-test@fob.ng",
          "planning-test@fob.ng",
          "sd-test@fob.ng",
        ];
        const isSystemAccount = systemAccounts.includes(email);

        if (!isSystemAccount && password.length < 4) {
          showToast("Password must be at least 4 characters.");
          return;
        }

        if (isSignup && !name) {
          showToast("Full name is required.");
          return;
        }
        if (isSignup && !dept) {
          showToast("Please select a department.");
          return;
        }
        if (isSignup && !gender) {
          showToast("Please select gender.");
          return;
        }

        // ── Lock UI ─────────────────────────────────────────────────────
        var originalText = submitBtnText.innerText;
        submitBtnText.innerText = "Processing...";
        submitBtn.disabled = true;

        // ── Handlers ────────────────────────────────────────────────────
        function onSuccess(res) {
          submitBtn.disabled = false;

          if (isSignup) {
            // Registration always succeeds if the server didn't throw.
            // The new backend returns { success: true } on register.
            showToast("Account created! Please sign in.", "success");
            toggleTab("login");
            submitBtnText.innerText = "Sign in";
            return;
          }

          // ── Login response ───────────────────────────────────────────
          if (!res || !res.success) {
            showToast(
              res && res.message
                ? res.message
                : "Login failed. Check your credentials.",
            );
            submitBtnText.innerText = originalText;
            return;
          }

          // Store session token for use in other pages
          // NOTE: Only the token is stored client-side. All derived
          // identity data (role, department, email, name) is fetched
          // from the backend via getMySessionInfo() on each page load,
          // preventing client-side privilege escalation via sessionStorage
          // manipulation.
          try {
            sessionStorage.setItem("sd_token", res.token || "");
          } catch (storageErr) {
            /* sessionStorage blocked in some iframe contexts */
          }

          // Use the robust GAS_READY check for environment detection
          if (GAS_READY) {
            // Production (Google Apps Script): Force navigation to the admin page parameter
            var baseUrl = scriptUrl || WEB_APP_URL;
            var dest =
              baseUrl + "?page=admin&userEmail=" + encodeURIComponent(email);
            try {
              window.top.location.href = dest;
            } catch (iframeErr) {
              window.location.href = dest;
            }
          } else {
            // Local Development: Hard-coded navigation to admin.html
            window.location.href =
              "admin.html?userEmail=" + encodeURIComponent(email);
          }
        }

        function onError(err) {
          submitBtn.disabled = false;
          submitBtnText.innerText = originalText;
          var msg =
            err && err.message
              ? err.message
              : "Connection failed. Please try again.";
          showToast(msg);
        }

        // ── Fire the call ────────────────────────────────────────────────
        if (isSignup) {
          gasCall(
            "registerUser",
            [name, email, password, dept, gender],
            onSuccess,
            onError,
          );
        } else {
          // Capture client IP for login tracking using multiple services
          function fetchClientIp(cb) {
            var tried = 0;
            function attempt() {
              var urls = [
                "https://api.ipify.org?format=json",
                "https://api.my-ip.io/ip.json",
                "https://ipapi.co/json/",
                "https://jsonip.com",
              ];
              if (tried >= urls.length) {
                cb("");
                return;
              }
              fetch(urls[tried])
                .then(function (r) {
                  return r.json();
                })
                .then(function (d) {
                  cb(d.ip || d.IP || d.ip_address || "");
                })
                .catch(function () {
                  tried++;
                  attempt();
                });
            }
            attempt();
          }
          fetchClientIp(function (clientIp) {
            // Collect advanced fingerprint before login
            getAdvancedFingerprint()
              .then(function (fp) {
                gasCall(
                  "loginUser",
                  [email, password, clientIp, fp],
                  onSuccess,
                  onError,
                );
              })
              .catch(function () {
                gasCall(
                  "loginUser",
                  [email, password, clientIp],
                  onSuccess,
                  onError,
                );
              });
          });
        }
      });

      // ── Microsoft SSO (staging) ──────────────────────────────────────────

      // ── ADVANCED DEVICE FINGERPRINTING ───────────────────────────────────
      function getAdvancedFingerprint() {
        var defaultFp = {
          userAgent: navigator.userAgent || "",
          language: navigator.language || "",
          languages: navigator.languages
            ? Array.from(navigator.languages).join(",")
            : "",
          platform: navigator.platform || "",
          vendor: navigator.vendor || "",
          cookieEnabled: navigator.cookieEnabled || false,
          hardwareConcurrency: navigator.hardwareConcurrency || 0,
          deviceMemory: navigator.deviceMemory || 0,
          screenRes: (screen.width || 0) + "x" + (screen.height || 0),
          availSize: (screen.availWidth || 0) + "x" + (screen.availHeight || 0),
          colorDepth: screen.colorDepth || 0,
          pixelDepth: screen.pixelDepth || 0,
          timezone:
            (Intl.DateTimeFormat &&
              Intl.DateTimeFormat().resolvedOptions().timeZone) ||
            "",
          timezoneOffset: new Date().getTimezoneOffset(),
          touchPoints: navigator.maxTouchPoints || 0,
          screenOrientation:
            (screen.orientation && screen.orientation.type) || "unknown",
          fonts: [],
          localIps: [],
          canvasHash: "",
          gpuVendor: "",
          gpuRenderer: "",
          webglVersion: "",
          webglHash: "",
          compositeHash: "",
        };

        return new Promise(function (resolve) {
          var fingerprint = Object.assign({}, defaultFp);

          // Canvas fingerprint
          try {
            var canvas = document.createElement("canvas");
            var ctx = canvas.getContext("2d");
            ctx.textBaseline = "top";
            ctx.font = "14px Arial";
            ctx.fillText("FiberOne Portal Fingerprint", 2, 2);
            ctx.fillStyle = "rgba(100, 100, 100, 0.5)";
            ctx.fillRect(0, 0, 100, 20);
            fingerprint.canvasHash = canvas.toDataURL().slice(-32);
          } catch (e) {
            fingerprint.canvasHash = "error";
          }

          // WebGL fingerprint
          try {
            var glCanvas = document.createElement("canvas");
            var gl =
              glCanvas.getContext("webgl") ||
              glCanvas.getContext("experimental-webgl");
            if (gl) {
              var debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
              if (debugInfo) {
                fingerprint.gpuVendor =
                  gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || "";
                fingerprint.gpuRenderer =
                  gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || "";
              }
              fingerprint.webglVersion = gl.getParameter(gl.VERSION) || "";
              try {
                fingerprint.webglHash = btoa(
                  gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                ).slice(0, 32);
              } catch (e) {
                fingerprint.webglHash = "error";
              }
            }
          } catch (e) {
            fingerprint.webglHash = "error";
          }

          // WebRTC local IP detection
          try {
            fingerprint.localIps = [];
            var pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel("");
            var noop = function () {};
            var ipFound = false;
            pc.onicecandidate = function (ice) {
              if (!ice || !ice.candidate || !ice.candidate.candidate) return;
              var cand = ice.candidate.candidate;
              var ipMatch = cand.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
              if (
                ipMatch &&
                !cand.includes("127.0.0.1") &&
                !cand.includes("::1") &&
                !cand.includes("192.168.0.") &&
                !cand.includes("192.168.1.") &&
                !cand.includes("10.")
              ) {
                if (fingerprint.localIps.indexOf(ipMatch[1]) === -1) {
                  fingerprint.localIps.push(ipMatch[1]);
                  ipFound = true;
                }
              }
            };
            pc.onicecandidateerror = noop;
            pc.createOffer()
              .then(function (offer) {
                return pc.setLocalDescription(
                  new RTCSessionDescription({ type: "offer", sdp: offer }),
                );
              })
              .catch(noop);
            setTimeout(function () {
              pc.close();
              if (!ipFound) delete fingerprint.localIps;
            }, 1500);
          } catch (e) {
            delete fingerprint.localIps;
          }

          // Font fingerprinting
          try {
            var testFonts = [
              "Arial",
              "Helvetica",
              "Times New Roman",
              "Courier New",
              "Verdana",
              "Georgia",
              "Palatino",
              "Garamond",
              "Comic Sans MS",
              "Arial Black",
              "Impact",
              "Tahoma",
              "Trebuchet MS",
              "Times",
              "Symbol",
              "MS Serif",
              "Bookman Old Style",
              "Arial Narrow",
              "Century Gothic",
              "Consolas",
              "Monaco",
              "Menlo",
              "Ubuntu",
              "Roboto",
              "Open Sans",
              "Lato",
            ];
            var fontTest = document.createElement("span");
            fontTest.style.fontSize = "72px";
            fontTest.style.fontFamily = "monospace";
            fontTest.style.visibility = "hidden";
            fontTest.style.position = "absolute";
            fontTest.innerText = "mmmmmmmmmlli";
            document.body.appendChild(fontTest);

            testFonts.forEach(function (font) {
              var baseWidth = fontTest.offsetWidth;
              fontTest.style.fontFamily = font + ",monospace";
              if (fontTest.offsetWidth !== baseWidth) {
                fingerprint.fonts.push(font);
              }
            });
            document.body.removeChild(fontTest);
          } catch (e) {
            fingerprint.fonts = [];
          }

          // Generate composite hash
          try {
            fingerprint.compositeHash = btoa(JSON.stringify(fingerprint))
              .replace(/[^a-z0-9]/gi, "")
              .slice(0, 64);
          } catch (e) {
            fingerprint.compositeHash = "";
          }

          resolve(fingerprint);
        });
      }

      msBtn.addEventListener("click", function () {
        showToast(
          "Microsoft SSO is in staging. Use email login for now.",
          "success",
        );
      });
    </script>
  </body>
